name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      source:
        description: 'Dispatch source, e.g. data-pipeline'
        required: false
        type: string
      source_run_id:
        description: 'Data Pipeline run id that requested deployment'
        required: false
        type: string
      source_sha:
        description: 'Generated data commit SHA requested for deployment'
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          fetch-depth: 0

      - name: Verify requested source SHA
        if: ${{ inputs.source_sha != '' }}
        env:
          EXPECTED_SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          EXPECTED_SHA="$EXPECTED_SOURCE_SHA"
          ACTUAL_SHA="$(git rev-parse HEAD)"
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "Checked out $ACTUAL_SHA but expected $EXPECTED_SHA" >&2
            exit 1
          fi

      - name: Verify requested source SHA is on main
        if: ${{ inputs.source_sha != '' }}
        env:
          REQUESTED_SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          REQUESTED_SHA="$REQUESTED_SOURCE_SHA"
          git fetch --no-tags --prune origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$REQUESTED_SHA" origin/main; then
            echo "Requested source SHA $REQUESTED_SHA is not reachable from origin/main" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate committed data
        run: npm run data:validate

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Prepare geo assets
        run: npm run prepare:geo

      - name: Build static site
        run: npm run build

      - name: Check initial bundle size
        run: npm run bundle:check

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
