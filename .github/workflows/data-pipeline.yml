name: Data Pipeline

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/data-pipeline.yml'
      - 'scripts/**'
      - 'src/data/**'
      - 'public/sources/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vite.config.*'

permissions:
  contents: write
  actions: write

concurrency:
  group: data-pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Prepare staging data directory
        run: rm -rf public/data-staging && mkdir -p public/data-staging && rsync -a public/data/ public/data-staging/

      - name: Run pipeline into staging
        run: COMPUTEATLAS_DATA_DIR=public/data-staging npm run pipeline

      - name: Validate staged data
        run: npm run data:validate:dir -- public/data-staging

      - name: Promote validated data
        run: rsync -a --delete public/data-staging/ public/data/

      - name: Snapshot validated data
        run: npm run data:snapshot -- public/data

      - name: Validate promoted data
        run: npm run data:validate

      - name: Prepare geographic assets
        run: npm run prepare:geo

      - name: Build site
        run: npm run build

      - name: Check bundle budget
        run: npm run bundle:check

      - name: Configure git identity
        run: |
          git config user.name "ComputeAtlas Bot"
          git config user.email "actions@github.com"

      - name: Commit generated data
        id: commit-generated-data
        run: |
          git add public/data
          if git diff --cached --quiet; then
            echo "No generated data changes to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: refresh automated snapshot"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch Deploy Pages
        if: steps.commit-generated-data.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy.yml --ref main \
            -f source=data-pipeline \
            -f source_run_id="${{ github.run_id }}" \
            -f source_sha="$(git rev-parse HEAD)"
